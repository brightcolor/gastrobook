services:
  app:
    image: ghcr.io/brightcolor/gastrobook:latest
    # Exports the baked public/ assets for nginx, migrates, then serves PHP
    command: sh -c "cp -a /var/www/html/public/. /public-export/ && php artisan migrate --force && php artisan db:seed --class=PlanSeeder --force && php artisan gastrobook:create-admin --if-missing && exec php-fpm"
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: gastrobook
      DB_USERNAME: gastrobook
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      # Mail (SMTP) is configured via .env: MAIL_MAILER, MAIL_HOST, MAIL_PORT,
      # MAIL_USERNAME, MAIL_PASSWORD, MAIL_SCHEME, MAIL_FROM_ADDRESS/NAME.
    volumes:
      - ./storage:/var/www/html/storage
      - ./docker/data/public:/public-export
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: nginx:1.27-alpine
    ports:
      - "${GASTROBOOK_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/data/public:/var/www/html/public:ro
    depends_on:
      - app

  queue:
    image: ghcr.io/brightcolor/gastrobook:latest
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: gastrobook
      DB_USERNAME: gastrobook
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      # Mail (SMTP) for queued notifications is configured via .env
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - db
      - redis

  scheduler:
    image: ghcr.io/brightcolor/gastrobook:latest
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: gastrobook
      DB_USERNAME: gastrobook
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - db
      - redis

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gastrobook
      POSTGRES_USER: gastrobook
      POSTGRES_PASSWORD: secret
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastrobook"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - ./docker/data/redis:/data
