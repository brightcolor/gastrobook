services:
  app:
    image: ghcr.io/brightcolor/gastrobook:latest
    restart: unless-stopped
    # entrypoint.sh handles: asset copy, migrate, seeders, config cache, php-fpm
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-gastrobook}
      DB_USERNAME: ${DB_USERNAME:-gastrobook}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
      - ./docker/data/public:/public-export
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # PHP-FPM is ready once it accepts connections on port 9000
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s   # give migrations & caching time before first check counts

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${SWAYY_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/data/public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy  # nginx only starts once PHP-FPM is actually ready

  queue:
    image: ghcr.io/brightcolor/gastrobook:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-gastrobook}
      DB_USERNAME: ${DB_USERNAME:-gastrobook}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    image: ghcr.io/brightcolor/gastrobook:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-gastrobook}
      DB_USERNAME: ${DB_USERNAME:-gastrobook}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gastrobook}
      POSTGRES_USER: ${DB_USERNAME:-gastrobook}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gastrobook}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # --dir /data: Arbeitsverzeichnis explizit auf den Bind-Mount pinnen.
    # --stop-writes-on-bgsave-error no: schlägt ein RDB-Snapshot fehl (z. B.
    #   Rechte auf dem Bind-Mount), darf Redis NICHT in den Read-Only-Modus
    #   gehen — sonst fallen Cache, Session UND Queue gleichzeitig aus und die
    #   App ist nicht mehr erreichbar.
    command: redis-server --dir /data --stop-writes-on-bgsave-error no
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
